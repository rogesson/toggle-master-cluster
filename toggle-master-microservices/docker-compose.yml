services:
  # --- Databases ---
  auth-db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: authdb
    volumes:
      - ./db/auth-db-init.sql:/docker-entrypoint-initdb.d/init.sql
      - auth-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d authdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  flags-db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flagsdb
    volumes:
      - ./db/flags-db-init.sql:/docker-entrypoint-initdb.d/init.sql
      - flags-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d flagsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.11
    ports:
      - "9324:9324"
      - "9325:9325"

  # --- Setup (create DynamoDB table) ---
  setup:
    image: amazon/aws-cli:latest
    environment:
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtknFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
    depends_on:
      - dynamodb-local
      - elasticmq
    entrypoint:
      - sh
      - -c
      - |
        echo "Waiting for DynamoDB Local..."
        until aws dynamodb list-tables --endpoint-url http://dynamodb-local:8000 > /dev/null 2>&1; do
          sleep 2
        done
        echo "Creating DynamoDB table..."
        aws dynamodb create-table \
          --endpoint-url http://dynamodb-local:8000 \
          --table-name ToggleAnalysis \
          --attribute-definitions AttributeName=event_id,AttributeType=S \
          --key-schema AttributeName=event_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --no-cli-pager
        echo "DynamoDB table created successfully!"
        echo "Creating SQS queue..."
        aws sqs create-queue \
          --endpoint-url http://elasticmq:9324 \
          --queue-name evaluation-events \
          --attributes '{"DelaySeconds":"0"}' \
          --no-cli-pager
        echo "SQS queue created successfully!"
        echo "Setup complete!"

  # --- Microservices ---
  auth-service:
    build:
      context: ../auth-service
      dockerfile: ../toggle-master-microservices/auth-service/Dockerfile
    environment:
      PORT: "8001"
      DATABASE_URL: postgres://user:password@auth-db:5432/authdb
      MASTER_KEY: master-key-local-dev
    depends_on:
      auth-db:
        condition: service_healthy
    ports:
      - "8001:8001"

  flag-service:
    build:
      context: ../flag-service
      dockerfile: ../toggle-master-microservices/flag-service/Dockerfile
    environment:
      PORT: "8002"
      DATABASE_URL: postgres://user:password@flags-db:5432/flagsdb
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      flags-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8002:8002"

  targeting-service:
    build:
      context: ../targeting-service
      dockerfile: ../toggle-master-microservices/targeting-service/Dockerfile
    environment:
      PORT: "8003"
      DATABASE_URL: postgres://user:password@flags-db:5432/flagsdb
      AUTH_SERVICE_URL: http://auth-service:8001
    depends_on:
      flags-db:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "8003:8003"

  evaluation-service:
    build:
      context: ../evaluation-service
      dockerfile: ../toggle-master-microservices/evaluation-service/Dockerfile
    environment:
      PORT: "8004"
      REDIS_URL: redis://redis:6379
      FLAG_SERVICE_URL: http://flag-service:8002
      TARGETING_SERVICE_URL: http://targeting-service:8003
      SERVICE_API_KEY: tm_key_31be6ebeecced1cabdfdc2c3b00756edada212e8b6ec22280f015bf81158d65e
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtknFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_SQS_DISABLE_SIGNING: "true"
      AWS_SQS_ENDPOINT: http://elasticmq:9324
      AWS_SQS_URL: http://elasticmq:9324/000000000000/evaluation-events
      AWS_REGION: us-east-1
    depends_on:
      redis:
        condition: service_healthy
      flag-service:
        condition: service_started
      targeting-service:
        condition: service_started
    ports:
      - "8004:8004"

  analytics-service:
    build:
      context: ../analytics-service
      dockerfile: ../toggle-master-microservices/analytics-service/Dockerfile
    environment:
      PORT: "8005"
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtknFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_ENDPOINT_URL_SQS: http://elasticmq:9324
      AWS_ENDPOINT_URL_DYNAMODB: http://dynamodb-local:8000
      AWS_SQS_URL: http://elasticmq:9324/000000000000/evaluation-events
      AWS_DYNAMODB_TABLE: ToggleAnalysis
    depends_on:
      setup:
        condition: service_completed_successfully
      elasticmq:
        condition: service_started
    ports:
      - "8005:8005"

volumes:
  auth-db-data:
  flags-db-data:
